<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hookrooms | FIFA 2026 Travel Deals</title>
  <meta name="description" content="Book hotels, flights, apartments, condos, and holiday homes for FIFA 2026 with Hookrooms. Search host city deals and premium stays worldwide.">
  <style>
    :root{
      --blue:#0A2540;
      --blue-2:#14395f;
      --orange:#FF6B1A;
      --bg:#f6f8fb;
      --text:#122033;
      --muted:#5a6b7f;
      --card:#ffffff;
      --line:#e6eaf0;
      --shadow:0 14px 40px rgba(10,37,64,.08);
      --radius:22px;
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
      line-height:1.5;
    }
    a{text-decoration:none;color:inherit}
    img{max-width:100%;display:block}
    .wrap{max-width:1200px;margin:0 auto;padding:0 20px}
    .btn{
      display:inline-flex;align-items:center;justify-content:center;gap:8px;
      border:none;border-radius:16px;padding:14px 22px;font-weight:800;
      cursor:pointer;transition:.25s ease; text-decoration:none;
    }
    .btn-primary{background:var(--orange);color:#fff;box-shadow:0 12px 30px rgba(255,107,26,.28)}
    .btn-primary:hover{transform:translateY(-2px);background:#ea5c0f}
    .btn-secondary{background:#fff;color:var(--blue);border:1px solid var(--line)}
    .btn-secondary:hover{transform:translateY(-2px);border-color:#cfd9e6}
    .pill{
      display:inline-flex;align-items:center;gap:8px;
      background:rgba(255,255,255,.12);
      border:1px solid rgba(255,255,255,.18);
      color:#fff;border-radius:999px;padding:8px 14px;font-size:13px;font-weight:700;
      backdrop-filter:blur(10px);
    }

    /* Header */
    header{
      position:sticky;top:0;z-index:50;
      background:rgba(255,255,255,.92);
      backdrop-filter:blur(14px);
      border-bottom:1px solid var(--line);
    }
    .nav{
      display:flex;align-items:center;justify-content:space-between;gap:18px;
      min-height:76px;
    }
    .brand{
      display:flex;align-items:center;gap:12px;font-weight:900;font-size:22px;color:var(--blue);
      letter-spacing:-.02em;
    }
    .brand-mark{
      width:40px;height:40px;border-radius:14px;
      background:linear-gradient(135deg,var(--blue),var(--blue-2));
      position:relative;box-shadow:0 10px 22px rgba(10,37,64,.18);
      flex:0 0 auto;
    }
    .brand-mark:before{
      content:"";position:absolute;left:10px;top:11px;width:18px;height:4px;background:#fff;border-radius:999px;transform:rotate(-20deg)
    }
    .brand-mark:after{
      content:"";position:absolute;left:15px;top:8px;width:11px;height:11px;border:4px solid #fff;border-left-color:transparent;border-bottom-color:transparent;border-radius:50%;transform:rotate(45deg)
    }
    .nav-links{display:flex;gap:22px;align-items:center;flex-wrap:wrap;color:var(--muted);font-weight:700;font-size:14px}
    .nav-links a:hover{color:var(--orange)}
    .nav-cta{display:flex;align-items:center;gap:12px}

    /* Hero */
    .hero{
      position:relative;
      overflow:hidden;
      background:
        radial-gradient(circle at top left, rgba(255,107,26,.18), transparent 28%),
        radial-gradient(circle at 85% 10%, rgba(10,37,64,.18), transparent 24%),
        linear-gradient(135deg,#fbfcfe 0%, #edf3f8 100%);
      padding:72px 0 34px;
    }
    .hero:before{
      content:"";
      position:absolute;inset:auto -180px -120px auto;width:420px;height:420px;
      background:rgba(20,57,95,.08);border-radius:50%;
      filter:blur(4px);
    }
    .hero-grid{
      display:grid;
      grid-template-columns:1.06fr .94fr;
      gap:24px;
      align-items:start;
      position:relative;
      z-index:1;
    }
    .hero-copy{
      padding:18px 0 0;
    }
    .hero h1{
      margin:16px 0 14px;
      font-size:clamp(38px,5vw,68px);
      line-height:1.02;
      letter-spacing:-.05em;
